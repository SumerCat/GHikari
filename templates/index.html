<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHikari Toolbox - Desktop</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body data-theme="{{ 'dark' if ui_config.dark_mode == 'true' else 'light' }}">
    <div id="mouse-tracker"></div>
    

    <div class="meteors" id="meteor-container">
        {% if ui_config.show_meteors == 'true' %}
        <!-- Meteors will be generated by JS -->
        {% endif %}
    </div>
    <style id="dynamic-theme">
        :root {
            --bg-gradient: {{ ui_config.background_gradient }};
            --border-radius-lg: {{ ui_config.card_border_radius }};
            --primary-color: {{ ui_config.primary_color }};
        }
    </style>
    <div class="app-container">
        <header>
            <div class="logo">GHikari <span class="vibrant-text">Toolbox</span></div>
            <div style="flex:1"></div>
            <div class="status-bar">
                <span id="connection-status" class="dot"></span>
                <span id="status-text">正在连接系统...</span>
            </div>
        </header>

        <main>
            <section class="card config-section">
                <div class="editor-controls">
                    <h3>环境配置</h3>
                </div>
                <div class="tool-status-container" id="tool-status">
                    <div class="tool-item">
                        <span class="tool-name">ADB:</span>
                        <span class="tool-val" id="adb-status">检测中...</span>
                    </div>
                    <div class="tool-item">
                        <span class="tool-name">Fastboot:</span>
                        <span class="tool-val" id="fastboot-status">检测中...</span>
                    </div>
                </div>
                <div class="input-group">
                    <input type="text" id="adb-path" placeholder="ADB 路径 (默认使用系统 PATH)">
                    <button id="save-config" class="btn secondary">保存</button>
                </div>
                
                <div class="editor-controls" style="margin-top: 15px;">
                    <h3>AI 设置</h3>
                </div>
                <div class="ai-config-grid">
                    <div class="input-group">
                        <label class="switch-label">启用 AI: <input type="checkbox" id="ai-enabled"></label>
                    </div>
                    <input type="text" id="ai-api-key" placeholder="API Key" style="margin-top: 8px;">
                    <input type="text" id="ai-base-url" placeholder="Base URL (e.g. https://api.openai.com/v1)" style="margin-top: 8px;">
                    <input type="text" id="ai-model" placeholder="Model (e.g. gpt-3.5-turbo)" style="margin-top: 8px;">
                    <div id="moe-voice-config" style="margin-top: 8px;">
                        <div class="input-group">
                            <input type="text" id="moe-exe-path" placeholder="MoeVoice 执行文件路径" style="flex: 1;">
                            <button onclick="pickFile('moe-exe-path')" class="btn ghost btn-small" title="选择文件">
                                <svg viewBox="0 0 24 24" width="12" height="12" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                            </button>
                        </div>
                        <div class="input-group" style="margin-top: 8px;">
                            <input type="text" id="moe-model-path" placeholder="模型路径 (.pth)" style="flex: 1;">
                            <button onclick="pickFile('moe-model-path')" class="btn ghost btn-small" title="选择文件">
                                <svg viewBox="0 0 24 24" width="12" height="12" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                            </button>
                        </div>
                        <input type="text" id="moe-speaker-id" placeholder="说话人 ID (默认 0)" style="margin-top: 8px; width: 100%;">
                    </div>
                    <button id="save-ai-config" class="btn secondary btn-small" style="margin-top: 8px; width: 100%;">保存 AI 配置</button>
                </div>
            </section>

            <section class="card device-section">
                <div class="editor-controls">
                    <h3>设备列表</h3>
                </div>
                <div id="device-list-container">
                    <p class="empty-msg">正在扫描设备...</p>
                </div>
            </section>

            <section class="card actions-section">
                <div class="editor-controls">
                    <button id="refresh-tools-btn" class="btn ghost btn-small" title="刷新工具">
                        <svg viewBox="0 0 24 24" width="12" height="12" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"></path><path d="M1 20v-6h6"></path><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
                        工具
                    </button>
                    <button id="refresh-devices-btn" class="btn ghost btn-small" title="刷新设备">
                        <svg viewBox="0 0 24 24" width="12" height="12" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>
                        设备
                    </button>
                    <div style="flex:1"></div>
                    <button id="terminal-toggle" class="btn ghost btn-small">
                        <svg viewBox="0 0 24 24" width="12" height="12" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>
                        终端
                    </button>
                    <button id="fastboot-toggle" class="btn ghost btn-small">
                        <svg viewBox="0 0 24 24" width="12" height="12" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
                        刷写
                    </button>
                    <button id="ai-chat-toggle" class="btn ghost btn-small">
                        <svg viewBox="0 0 24 24" width="12" height="12" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                        AI
                    </button>
                    <button id="theme-toggle" class="btn ghost btn-small">
                        <svg viewBox="0 0 24 24" width="12" height="12" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                        模式
                    </button>
                    <button id="edit-layout-btn" class="btn secondary btn-edit btn-small">
                        <svg viewBox="0 0 24 24" width="12" height="12" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"></path></svg>
                        布局
                    </button>
                </div>
                
                <div id="button-grid" class="button-grid">
                    <button onclick="runCommand('adb reboot', this)" class="btn primary" data-id="reboot">重启系统</button>
                    <button onclick="runCommand('adb reboot recovery', this)" class="btn primary" data-id="recovery">Recovery</button>
                    <button onclick="runCommand('adb reboot bootloader', this)" class="btn primary" data-id="bootloader">Bootloader</button>
                    <button onclick="runCommand('adb reboot sideload', this)" class="btn primary" data-id="sideload">Sideload</button>
                    <button onclick="runCommand('adb logcat -d', this)" class="btn accent" data-id="logcat">Logcat</button>
                    <button onclick="runCommand('adb shell getprop ro.product.model', this)" class="btn accent" data-id="model">设备型号</button>
                    <button onclick="runCommand('adb shell wm size', this)" class="btn accent" data-id="res">屏幕分辨率</button>
                    <button onclick="runCommand('adb shell pm list packages', this)" class="btn accent" data-id="pkgs">应用列表</button>
                    <button onclick="runCommandWithInput('adb shell pm clear', '请输入包名 (Package Name):', this)" class="btn accent" data-id="clear-data">清除数据</button>
                    <button onclick="runCommand('adb shell &quot;dumpsys window | grep mCurrentFocus&quot;', this)" class="btn accent" data-id="current-act">当前界面</button>
                    <button onclick="runCommand('scrcpy --window-title GHikari-Mirror', this)" class="btn primary" style="background-color: var(--success-color);" data-id="scrcpy">屏幕投屏</button>
                </div>

                <!-- Integrated Fastboot Section -->
                <div id="fastboot-panel" class="fastboot-section minimized">
                    <div class="editor-controls" style="margin-top: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px;">
                        <button id="fb-partition-tab" class="btn ghost btn-small active">分区刷写</button>
                        <button id="fb-xiaomi-tab" class="btn ghost btn-small">小米线刷</button>
                        <button id="fb-tools-tab" class="btn ghost btn-small">刷机工具</button>
                        <div style="flex:1"></div>
                        <button id="close-fastboot" class="btn ghost btn-small">
                            <svg viewBox="0 0 24 24" width="12" height="12" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>
                            收起面板
                        </button>
                    </div>

                    <!-- Partition Flash Tab -->
                    <div id="tab-partition" class="fb-tab-content">
                        <div class="fastboot-row" style="margin-top: 15px;">
                            <div class="control-item">
                                <label>目标分区</label>
                                <div class="input-group">
                                    <select id="partition-select" class="custom-select">
                                        <option value="">等待加载...</option>
                                    </select>
                                    <button id="refresh-partitions" class="btn ghost btn-small" title="刷新分区">
                                        <svg viewBox="0 0 24 24" width="12" height="12" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"></path><path d="M1 20v-6h6"></path><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
                                    </button>
                                </div>
                            </div>
                            <div class="control-item" style="flex: 2;">
                                <label>镜像文件 (.img / .bin)</label>
                                <div class="input-group">
                                    <input type="text" id="flash-file-path" placeholder="输入或粘贴文件完整路径" style="flex: 1;">
                                    <button onclick="pickFile('flash-file-path')" class="btn ghost btn-small" title="选择文件">
                                        <svg viewBox="0 0 24 24" width="12" height="12" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                                    </button>
                                </div>
                            </div>
                            <div class="flash-actions">
                                <button id="start-flash" class="btn primary" style="width: 120px;">确认刷写</button>
                            </div>
                        </div>
                    </div>

                    <!-- Xiaomi Flash Tab -->
                    <div id="tab-xiaomi" class="fb-tab-content" style="display: none;">
                        <div class="fastboot-row" style="margin-top: 15px;">
                            <div class="control-item" style="flex: 2;">
                                <label>ROM 目录 (包含 flash_all 脚本)</label>
                                <div class="input-group">
                                    <input type="text" id="xiaomi-rom-path" placeholder="选择线刷包解压后的目录" style="flex: 1;">
                                    <button onclick="pickDirectory('xiaomi-rom-path')" class="btn ghost btn-small" title="选择目录">
                                        <svg viewBox="0 0 24 24" width="12" height="12" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                                    </button>
                                </div>
                            </div>
                            <div class="control-item">
                                <label>刷机模式</label>
                                <select id="xiaomi-mode-select" class="custom-select">
                                    <option value="clean_all">全部删除</option>
                                    <option value="keep_data">保留数据</option>
                                    <option value="lock">全部删除并上锁</option>
                                </select>
                            </div>
                            <div class="flash-actions">
                                <button id="start-xiaomi-flash" class="btn primary" style="width: 120px;">开始线刷</button>
                            </div>
                        </div>
                    </div>

                    <!-- Flash Tools Tab -->
                    <div id="tab-tools" class="fb-tab-content" style="display: none;">
                        <div class="button-grid" style="margin-top: 15px; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));">
                            <button onclick="runCommand('fastboot oem device-info', this)" class="btn secondary">BL 锁状态</button>
                            <button onclick="runCommand('fastboot getvar product', this)" class="btn secondary">查询代号</button>
                            <button onclick="runCommand('fastboot getvar anti', this)" class="btn secondary">防回滚等级</button>
                            <button onclick="runCommand('fastboot erase efs', this)" class="btn accent">擦除 EFS</button>
                            <button onclick="runCommand('fastboot format userdata', this)" class="btn accent">格式化 Data</button>
                            <button onclick="runCommand('fastboot oem edl', this)" class="btn primary">进入 EDL (9008)</button>
                        </div>
                    </div>

                    <div class="sidebar-footer" style="margin-top: 10px;">
                        <small id="fb-hint-text">请确保设备已进入 Fastboot 模式并连接。</small>
                    </div>
                </div>
            </section>

            <section class="card console-section">
                <div class="editor-controls">
                    <h3>终端日志</h3>
                    <div style="flex:1"></div>
                    <button id="clear-log-btn" class="btn ghost">清空日志</button>
                </div>
                <div class="console-wrapper">
                    <div class="terminal-quick-actions">
                        <button onclick="quickInput('adb devices')" class="btn ghost btn-small">adb devices</button>
                        <button onclick="quickInput('adb shell')" class="btn ghost btn-small">shell</button>
                        <button onclick="quickInput('fastboot devices')" class="btn ghost btn-small">fastboot devices</button>
                        <button onclick="quickInput('fastboot reboot')" class="btn ghost btn-small">fastboot reboot</button>
                        <button onclick="quickInput('scrcpy')" class="btn ghost btn-small">mirror</button>
                        <button onclick="quickInput('help')" class="btn ghost btn-small">help</button>
                    </div>
                    <div id="console-output" class="console">
                        <div class="line system">GHikari Web Console Ready.</div>
                    </div>
                    <div class="terminal-input-area">
                        <div id="suggestion-list" class="suggestion-list"></div>
                        <span class="prompt-icon">
                            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                        </span>
                        <input type="text" id="terminal-input" placeholder="输入命令 (Tab 补全)..." autocomplete="off" spellcheck="false">
                        <button id="stop-command-btn" class="btn ghost btn-small" title="停止当前命令 (Ctrl+C)" style="margin-left: 8px; border-color: rgba(255, 85, 85, 0.3); color: #ff5555;">
                            <svg viewBox="0 0 24 24" width="12" height="12" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>
                            停止
                        </button>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script>
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            var consoleOutput = document.getElementById('console-output');
            if (consoleOutput) {
                var div = document.createElement('div');
                div.className = 'line error';
                div.innerText = 'JS Error: ' + msg + ' (at ' + lineNo + ':' + columnNo + ')';
                consoleOutput.appendChild(div);
            }
            return false;
        };
    </script>
    <script src="{{ url_for('static', filename='js/socket.io.js') }}"></script>
    <script src="{{ url_for('static', filename='js/autocomplete.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <!-- Live2D Library Local -->
    <script src="{{ url_for('static', filename='live2d/autoload.js') }}"></script>
</body>
</html>
